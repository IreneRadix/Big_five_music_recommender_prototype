<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История прослушивания - Музыкальный сервис</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        /* Дополнительные стили для страницы истории */
        .history-header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--card-border);
        }
        
        .history-count {
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 500;
        }
        
        .clear-all-btn {
            background: var(--button-danger-bg);
            color: var(--button-danger-text);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clear-all-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        
        .track-timestamp {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        
        .notification-success { background: #4caf50; }
        .notification-error { background: #ff4757; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕒 Недавно прослушанные</h1>
            <div class="nav-links">
                <a href="/feed/{{ username }}" class="nav-link">🎵 Рекомендации</a>
                <a href="/favorites/{{ username }}" class="nav-link">⭐ Избранное</a>
            </div>
            <div class="user-info">
                <span class="username" id="usernameDisplay">{{ username }}</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div id="historyContent">
            <div class="loading">🎧 Загрузка истории прослушивания...</div>
        </div>
    </div>

    <div class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        ↑
    </div>
    
    <script src="/static/js/theme.js"></script>
    <script src="/js/history.js"></script>
    <script>
        const API_BASE = 'http://localhost:5000/api';

        function getCurrentUsername() {
            const path = window.location.pathname;
            const match = path.match(/\/history\/(.+)/);
            if (match && match[1]) {
                return match[1];
            }
            return localStorage.getItem('username') || localStorage.getItem('user_name');
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user_id');
            localStorage.removeItem('username');
            localStorage.removeItem('user_name');
            window.location.href = '/login';
        }

        window.addEventListener('scroll', () => {
            const btn = document.querySelector('.back-to-top');
            if (window.scrollY > 300) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const usernameDisplay = document.getElementById('usernameDisplay');
            const username = getCurrentUsername();
            if (usernameDisplay && username) {
                usernameDisplay.textContent = username;
            }
        });
    </script>
</body>
</html>
