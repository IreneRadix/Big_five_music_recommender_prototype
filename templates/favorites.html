<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранные треки - Музыкальный сервис</title>
    <link rel="stylesheet" href="/static/css/common.css">
    <style>
        .favorites-header {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid var(--card-border);
        }
        
        .favorites-count {
            color: var(--text-secondary);
            font-size: 18px;
            font-weight: 500;
        }
        
        .clear-all-btn {
            background: var(--button-danger-bg);
            color: var(--button-danger-text);
            border: 1px solid var(--card-border);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .clear-all-btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 1000;
            animation: slideInRight 0.3s ease;
            box-shadow: var(--shadow-sm);
            font-size: 14px;
            font-weight: 500;
            color: white;
        }
        
        .notification-success { background: #4caf50; }
        .notification-error { background: #ff4757; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ Мои избранные треки</h1>
            <div class="nav-links">
                <a href="/feed/{{ username }}" class="nav-link">🎵 Рекомендации</a>
                <a href="/history/{{ username }}" class="nav-link">🕒 История</a>
            </div>
            <div class="user-info">
                <span class="username" id="usernameDisplay">{{ username }}</span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div id="favoritesContent">
            <div class="loading">⭐ Загрузка избранных треков...</div>
        </div>
    </div>
    
    <script src="/static/js/theme.js"></script>
    <script src="/js/favorites.js"></script>
</body>
</html>
