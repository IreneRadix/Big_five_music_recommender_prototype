<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музыкальный сервис - Рекомендации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 28px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .username {
            font-weight: bold;
            color: #764ba2;
            font-size: 18px;
        }
        
        .logout-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .logout-btn:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }
        
        .stats-card {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stats-card p {
            color: #764ba2;
            font-size: 16px;
            font-weight: 500;
        }
        
        .recommendations-grid {
            display: grid;
            gap: 20px;
        }
        
        .track-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .track-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .track-number {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            min-width: 50px;
        }
        
        .track-cover {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            object-fit: cover;
        }
        
        .track-info {
            flex: 1;
        }
        
        .track-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .track-artist {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        
        .track-genre {
            color: #764ba2;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .track-reason {
            color: #667eea;
            font-size: 12px;
            background: #f0f0ff;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 15px;
            margin-top: 5px;
        }
        
        .track-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        
        .fav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .fav-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        
        .fav-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .audio-player {
            width: 250px;
            height: 35px;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            font-size: 18px;
            color: #667eea;
        }
        
        .no-recommendations {
            text-align: center;
            padding: 50px;
            background: white;
            border-radius: 15px;
            font-size: 18px;
            color: #999;
        }
        
        @media (max-width: 768px) {
            .track-card {
                flex-direction: column;
                text-align: center;
            }
            
            .track-actions {
                align-items: center;
            }
            
            .audio-player {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Музыкальный сервис</h1>
            <div class="user-info">
                <span class="username" id="usernameDisplay"></span>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div id="recommendations">
            <div class="loading">🎵 Загрузка рекомендаций...</div>
        </div>
    </div>
    
    <script src="/js/main.js"></script>
</body>
</html>
