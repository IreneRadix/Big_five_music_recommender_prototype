<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <!--<link rel="stylesheet" href="/css/style.css">-->
</head>
<body>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h2 class="auth-title">🎵 Вход</h2>
            
            <div id="errorMessage" class="error-message" style="display: none;"></div>
            <div id="successMessage" class="success-message" style="display: none;"></div>
            
            <form id="loginForm" class="auth-form" method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" class="auth-input" placeholder="Введите имя пользователя" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="auth-input" placeholder="example@mail.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" class="auth-input" placeholder="Введите пароль" required>
                </div>
                
                <button type="submit" class="auth-button">Войти</button>
            </form>
            
            <div class="auth-footer">
                Нет аккаунта? <a href="/register" class="auth-link">Зарегистрироваться</a>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
